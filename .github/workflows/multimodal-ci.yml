name: multimodal-ci

on:
  push:
    branches: ["main", "work"]
  pull_request:

jobs:
  test-and-benchmark:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest cryptography

      - name: Run multimodal tests
        run: |
          python -m pytest -q test_ntf_roundtrip.py test_ntf_multimodal_benchmark.py

      - name: Run comprehensive suite
        run: |
          python test_ntf_comprehensive.py

      - name: Run multimodal benchmark with quality gates
        run: |
          python ntf_multimodal_benchmark.py \
            --dataset eval/datasets/multimodal_regression.jsonl \
            --output eval/results/multimodal_latest.json \
            --docs-output docs/benchmarking/multimodal_latest.json \
            --history-file docs/benchmarking/multimodal_history.json \
            --min-rdf 95 \
            --min-scs 97 \
            --min-ssr 70 \
            --min-case-rdf 94 \
            --min-case-scs 95 \
            --min-case-ssr 35 \
            --enforce-thresholds \
            --json

      - name: Run additional domain datasets
        run: |
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_finance.jsonl --json
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_medical.jsonl --json
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_legal.jsonl --json
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_code_heavy.jsonl --json
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_expanded_120.jsonl --json
          python ntf_multimodal_benchmark.py --dataset eval/datasets/multimodal_expanded_600.jsonl --json

      - name: Upload benchmark artifact
        uses: actions/upload-artifact@v4
        with:
          name: multimodal-benchmark-py${{ matrix.python-version }}
          path: |
            eval/results/multimodal_latest.json
            docs/benchmarking/multimodal_latest.json
            docs/benchmarking/multimodal_history.json
